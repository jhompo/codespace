version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml — Servicios de soporte para desarrollo local
#  Uso: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: dev-mongodb
    environment:
      MONGO_INITDB_DATABASE: appdb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis UI (RedisInsight) ──────────────────────────────────────────────────
  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: dev-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis

  # ── Mongo Express (UI para MongoDB) ──────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: dev-mongo-express
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      - mongodb

  # ── pgAdmin (UI para PostgreSQL) ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dev-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dev.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  mongo_data:
  redis_data:
