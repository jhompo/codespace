spring:
  application:
    name: springboot-codespace

  # ── Perfiles activos ────────────────────────────────────────────────────────
  profiles:
    active: dev

  # ── WebFlux ─────────────────────────────────────────────────────────────────
  webflux:
    base-path: /api

  # ── R2DBC (PostgreSQL) ──────────────────────────────────────────────────────
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/appdb
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    pool:
      initial-size: 5
      max-size: 20

  # ── MongoDB reactivo ─────────────────────────────────────────────────────────
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/appdb}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  # ── Seguridad OAuth2 / JWT ───────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:9000}
          jwk-set-uri: ${JWT_JWK_URI:http://localhost:9000/.well-known/jwks.json}

  # ── Flyway ───────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

# ── Servidor ─────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator / Salud ─────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, loggers
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

# ── OpenAPI / Swagger ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.example: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data: DEBUG
    io.r2dbc: DEBUG
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"
